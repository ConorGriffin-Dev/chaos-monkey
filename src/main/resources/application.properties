# Chaos Monkey ? v0.1
#
# Disable the embedded web server entirely.
# This is a CLI tool. Spring Boot starts, Spring Shell owns
# the terminal, no HTTP port is opened.
spring.main.web-application-type=none

# Suppress the Spring Boot banner ? cleaner CLI output
spring.main.banner-mode=off

# Spring Shell ? disable the interactive REPL prompt.
# We are running non-interactively: the user passes arguments
# on the command line and the tool exits when done.
spring.shell.interactive.enabled=false